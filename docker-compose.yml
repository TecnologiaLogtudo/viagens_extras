services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: viagens-extras-app
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/logtudo
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:-logtudo-viagens-extras-secret-key-change-me}
      - ROOT_PATH=${ROOT_PATH:-/viagens_extras}
    volumes:
      - app_data:/app/app/data
    expose:
      - "8000"
    # Para testar localmente, remova o '#' das duas linhas abaixo.
    # Lembre-se de comentar novamente (com '#') antes de enviar ao Coolify!
    # ports:
    #   - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    command: ["sh", "-c", "python tools/seed_all.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  db:
    image: postgres:15-alpine
    container_name: viagens-extras-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-logtudo}
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_data:
  postgres_data:
