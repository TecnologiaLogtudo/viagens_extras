{% extends 'base.html' %}
{% block content %}
<section class="hero">
  <h2>Portal Parceiro</h2>
  <p>Abra novas solicitações e acompanhe o status de ponta a ponta.</p>
  {% if message %}
  <p class="pill green">{{ message }}</p>
  {% endif %}
</section>

<section class="panel split">
  <article class="card">
    <h3>Nova solicitação</h3>
    <form class="form-grid" method="post" action="/partner/requests/new">
      <label>Base
        <select name="base_id" required>
          {% for base in bases.values() %}
          <option value="{{ base.id }}">{{ base.name }} - {{ base.location }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Tipo
        <select name="request_type" required>
          <option value="Viagem extra NILO">Viagem extra NILO</option>
          <option value="Carro dedicado">Carro dedicado</option>
          <option value="Carro extra rota D2D">Carro extra rota D2D</option>
          <option value="Cotação de preço">Cotação de preço</option>
        </select>
      </label>
      <label>Data/Hora
        <input type="datetime-local" name="requested_datetime" required />
      </label>
      <label>Quantidade
        <input type="number" min="1" id="req-quantity" name="quantity" value="1" required oninput="updateVehicleSelects()" />
      </label>
      <label>Origem
        <input name="origin" required />
      </label>
      <label>Destino
        <input name="destination" required />
      </label>
      <div id="requested-vehicles-container" class="full" style="display: grid; grid-template-columns: 1fr; gap: 0.5rem;">
        <!-- Dynamically generated vehicle selects go here -->
      </div>
      <label>Motivo
        <input name="reason" />
      </label>
      <label class="full">Notas
        <textarea name="notes"></textarea>
      </label>
      <button class="full" type="submit">Registrar solicitação</button>
    </form>
  </article>

  {% include '_partner_metrics.html' %}
</section>

{% include '_partner_requests.html' %}

<script>
  const vehicleTypes = {{ vehicle_types | tojson }};
  function updateVehicleSelects() {
    const container = document.getElementById('requested-vehicles-container');
    const qtyInput = document.getElementById('req-quantity');
    if (!container || !qtyInput) return;
    let qty = parseInt(qtyInput.value) || 1;
    if (qty < 1) qty = 1;
    
    container.innerHTML = '';
    
    for (let i = 0; i < qty; i++) {
      const label = document.createElement('label');
      label.style.display = 'block';
      label.style.width = '100%';
      
      const labelText = qty > 1 ? `Tipo do Veículo ${i + 1}` : 'Veículo desejado';
      label.innerHTML = `${labelText} *<br/>`;
      
      const select = document.createElement('select');
      select.name = 'vehicle_type_requested';
      select.required = true;
      select.style.width = '100%';
      select.style.padding = '0.5rem';
      
      vehicleTypes.forEach(vt => {
        const opt = document.createElement('option');
        opt.value = vt.toLowerCase();
        opt.textContent = vt;
        if (vt.toLowerCase() === 'sedan') {
          opt.selected = true;
        }
        select.appendChild(opt);
      });
      
      label.appendChild(select);
      container.appendChild(label);
    }
  }
  document.addEventListener('DOMContentLoaded', updateVehicleSelects);
</script>
{% endblock %}
