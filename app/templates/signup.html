<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or 'Cadastro' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css" />
  <style>
    body {
      background: url('{{ ROOT_PATH }}/static/imagens/textura3.png');
      background-size: contain;
      background-attachment: fixed;
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-grayscale"></div>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="kicker">Novo cadastro</p>
      <img src="/static/imagens/LogoPrincipal.png" alt="Logtudo" class="auth-logo">
      <h1>Criar conta de parceiro</h1>
      <p>Preencha seus dados para acessar o portal de solicitações.</p>

      {% if error %}
      <p class="error-text">{{ error }}</p>
      {% endif %}

      <form method="post" action="/signup" class="auth-form form-grid">
        {% from 'profile_form.html' import profile_fields %}
        {{ profile_fields() }}
        <button class="full" type="submit">Criar conta</button>
      </form>

      <p class="muted">Já tem conta? <a href="/login">Entrar</a></p>
    </section>
  </main>
  <script>
    document.addEventListener("click", function(e) {
      const btn = e.target.closest(".password-toggle");
      if (!btn) return;
      e.preventDefault();
      const input = btn.previousElementSibling;
      if (input && input.tagName === 'INPUT') {
        const isPass = input.type === 'password';
        input.type = isPass ? 'text' : 'password';
        btn.innerHTML = isPass 
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      }
    });
  </script>
</body>
</html>
